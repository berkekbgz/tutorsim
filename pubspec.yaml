name: tutorsim
description: "TutorSim — a top-down 42 cluster patrol game (3-day vertical slice)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0-146.0.dev

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.10.5
  audioplayers: ^6.6.0
  http: ^1.2.2
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/Exploring The Unknown/
    - assets/Bump.wav
    - assets/Boss hit 1.wav
    - assets/Digital_Alarm.wav
    - assets/Water_Splash.wav
    - assets/driken5482-retro-coin-4-236671.mp3
  fonts:
    - family: PressStart2P
      fonts:
        - asset: assets/PressStart2P-Regular.ttf
